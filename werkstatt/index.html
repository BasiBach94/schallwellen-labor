<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Werkstatt Dashboard</title><style>
:root{color-scheme:dark;--bg:#0b0b08;--panel:rgba(32,26,15,.86);--panel2:rgba(255,255,255,.055);--line:rgba(255,226,170,.16);--text:#fff8e8;--muted:rgba(255,248,232,.68);--gold:#ffd36e;--green:#70f0a6;--blue:#6bd2ff;--red:#ff6b6b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 8%,rgba(255,211,110,.18),transparent 34%),linear-gradient(145deg,var(--bg),#20170c 60%,#040403);color:var(--text)}button,input,textarea,select{font:inherit}button{min-height:40px;border:1px solid var(--line);border-radius:13px;padding:0 12px;background:rgba(255,255,255,.07);color:var(--text);font-weight:850}.primary{border:0;color:#160d02;background:linear-gradient(135deg,var(--gold),var(--blue))}.danger{background:rgba(255,107,107,.15);border-color:rgba(255,107,107,.35)}a{color:inherit;text-decoration:none}.app{max-width:1220px;margin:auto;padding:14px}.top,.card{border:1px solid var(--line);border-radius:24px;background:var(--panel);box-shadow:0 18px 55px rgba(0,0,0,.3);overflow:hidden}.top{padding:18px;display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:0;font-size:clamp(30px,5vw,54px);letter-spacing:-.05em}.sub{color:var(--muted);margin:5px 0 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.head{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.08)}.head h2{margin:0;font-size:19px}.body{padding:14px}.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.tile,.item{padding:12px;border-radius:16px;background:var(--panel2);border:1px solid rgba(255,255,255,.08)}.tile span{display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em}.tile b{display:block;margin-top:5px;font-size:22px}.form{display:grid;grid-template-columns:1fr 1fr auto;gap:8px}.form input,.form select,.notes{min-height:40px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06);color:var(--text);padding:0 10px}.notes{width:100%;min-height:130px;padding:12px;resize:vertical}.list{display:grid;gap:8px}.item{display:flex;justify-content:space-between;gap:10px}.item small{color:var(--muted)}.ok{color:var(--green)}.warn{color:var(--gold)}.bad{color:var(--red)}@media(max-width:850px){.grid{grid-template-columns:1fr}.tiles,.form{grid-template-columns:1fr 1fr}.top{flex-direction:column;align-items:flex-start}}@media(max-width:480px){.tiles,.form{grid-template-columns:1fr}.app{padding:9px}}
</style></head><body><div class="app"><section class="top"><div><h1>Werkstatt Dashboard</h1><p class="sub">Maschinen, Fräse, Lochmuster, Wartung, Checklisten und offene Aufgaben.</p></div><a class="primary" style="padding:11px 14px;border-radius:13px" href="../">Hub</a></section><section class="grid"><div class="card"><div class="head"><h2>Maschinenstatus</h2><button id="saveMachine" class="primary">Speichern</button></div><div class="body"><div class="tiles"><div class="tile"><span>Fräse</span><b>FU 321 M</b></div><div class="tile"><span>Betriebsart</span><b id="modeOut">--</b></div><div class="tile"><span>Nächste Wartung</span><b id="maintOut">--</b></div></div><div class="form" style="margin-top:12px"><select id="mode"><option>Bereit</option><option>Einrichten</option><option>Wartung</option><option>Störung</option></select><input id="maintDate" type="date"><button class="primary">OK</button></div></div></div><div class="card"><div class="head"><h2>Lochmuster</h2><button id="addPattern" class="primary">Hinzufügen</button></div><div class="body"><div class="form"><input id="patName" placeholder="Name"><input id="patData" placeholder="z. B. 4x Ø8 / Raster 50"><button id="clearPatterns" class="danger">Leeren</button></div><div id="patterns" class="list" style="margin-top:12px"></div></div></div><div class="card"><div class="head"><h2>Checkliste</h2><button id="resetChecks" class="danger">Reset</button></div><div class="body"><div id="checks" class="list"></div></div></div><div class="card"><div class="head"><h2>Aufgaben & Notizen</h2><button id="saveNotes" class="primary">Speichern</button></div><div class="body"><textarea id="notes" class="notes" placeholder="z. B. Spannmittel prüfen, Endschalter testen, HMI Lochmuster erweitern…"></textarea><div id="tasks" class="list" style="margin-top:12px"></div></div></div></section></div><script>
const $=id=>document.getElementById(id),key='workshopDash.v1';let s={mode:'Bereit',maintDate:'',patterns:[],checks:{},notes:''};const checkNames=['Maschine gereinigt','Schmierung geprüft','Spannmittel geprüft','Not-Aus getestet','Endschalter getestet','Werkzeugaufnahme geprüft','Absaugung/Kühlung geprüft'];function load(){try{s=JSON.parse(localStorage.getItem(key))||s}catch(e){}mode.value=s.mode;maintDate.value=s.maintDate||'';notes.value=s.notes||'';render()}function save(){localStorage.setItem(key,JSON.stringify(s));render()}function days(d){return d?Math.ceil((new Date(d)-new Date())/86400000):null}function render(){modeOut.textContent=s.mode;let d=days(s.maintDate);maintOut.textContent=d==null?'--':d<0?'überfällig':d+' Tage';maintOut.className=d!=null&&d<7?'warn':'';patterns.innerHTML=s.patterns.length?s.patterns.map((p,i)=>`<div class=item><div><b>${p.name}</b><small>${p.data}</small></div><button data-i=${i}>×</button></div>`).join(''):'<p class=sub>Noch keine Lochmuster.</p>';patterns.querySelectorAll('button').forEach(b=>b.onclick=()=>{s.patterns.splice(b.dataset.i,1);save()});checks.innerHTML=checkNames.map(c=>`<label class=item><div><b>${c}</b><small>${s.checks[c]?'erledigt':'offen'}</small></div><input type=checkbox ${s.checks[c]?'checked':''} data-c="${c}"></label>`).join('');checks.querySelectorAll('input').forEach(x=>x.onchange=()=>{s.checks[x.dataset.c]=x.checked;save()});let open=checkNames.filter(c=>!s.checks[c]).slice(0,4);tasks.innerHTML=open.map(t=>`<div class=item><b>${t}</b><small>offen</small></div>`).join('')||'<p class=sub>Alles erledigt.</p>'}saveMachine.onclick=()=>{s.mode=mode.value;s.maintDate=maintDate.value;save()};addPattern.onclick=()=>{if(!patName.value)return;s.patterns.push({name:patName.value,data:patData.value});patName.value=patData.value='';save()};clearPatterns.onclick=()=>{if(confirm('Lochmuster löschen?')){s.patterns=[];save()}};resetChecks.onclick=()=>{s.checks={};save()};saveNotes.onclick=()=>{s.notes=notes.value;save()};load();
</script></body></html>
