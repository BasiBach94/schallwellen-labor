<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>TV Dashboard</title><style>
:root{color-scheme:dark;--bg:#050b10;--panel:rgba(10,22,32,.82);--panel2:rgba(255,255,255,.055);--line:rgba(255,255,255,.14);--text:#f4fbff;--muted:rgba(244,251,255,.68);--blue:#6bd2ff;--green:#70f0a6;--yellow:#ffd36e;--red:#ff6b6b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 15% 8%,rgba(107,210,255,.18),transparent 34%),linear-gradient(145deg,var(--bg),#0b1720 65%,#030608);color:var(--text)}button,input,textarea{font:inherit}button{min-height:40px;border:1px solid var(--line);border-radius:13px;padding:0 12px;background:rgba(255,255,255,.075);color:var(--text);font-weight:850}.primary{border:0;color:#04110d;background:linear-gradient(135deg,var(--blue),var(--green))}.danger{background:rgba(255,107,107,.16);border-color:rgba(255,107,107,.35)}a{color:inherit;text-decoration:none}.app{height:100vh;padding:14px;display:grid;grid-template-rows:auto 1fr;gap:14px}.top,.card{border:1px solid var(--line);border-radius:24px;background:var(--panel);box-shadow:0 18px 55px rgba(0,0,0,.3);overflow:hidden}.top{padding:14px 16px;display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:0;font-size:clamp(30px,5vw,54px);letter-spacing:-.05em}.sub{color:var(--muted);margin:5px 0 0}.grid{height:100%;display:grid;grid-template-columns:1.1fr .9fr;grid-template-rows:1fr 1fr;gap:14px}.card{display:grid;grid-template-rows:54px 1fr}.head{display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.08)}.head h2{margin:0;font-size:19px}.body{padding:14px;overflow:auto}.bigtime{font-size:clamp(74px,13vw,170px);line-height:.85;letter-spacing:-.08em}.date{font-size:clamp(22px,3vw,42px);color:var(--muted)}.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.tile,.item{padding:12px;border-radius:16px;background:var(--panel2);border:1px solid rgba(255,255,255,.08)}.tile span{display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em}.tile b{display:block;margin-top:5px;font-size:24px}.list{display:grid;gap:8px}.item{display:flex;justify-content:space-between;gap:10px}.item small{color:var(--muted)}.form{display:grid;grid-template-columns:1fr 1fr auto;gap:8px}.form input,.form textarea{min-height:40px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06);color:var(--text);padding:0 10px}.slide{height:100%;display:grid;place-items:center;text-align:center}.slide strong{font-size:clamp(38px,7vw,90px);letter-spacing:-.06em}.slide span{display:block;color:var(--muted);font-size:clamp(16px,2vw,28px);margin-top:10px}@media(max-width:850px){.grid{grid-template-columns:1fr;grid-template-rows:auto}.app{overflow:auto}.tiles,.form{grid-template-columns:1fr 1fr}.top{flex-direction:column;align-items:flex-start}}@media(max-width:520px){.tiles,.form{grid-template-columns:1fr}.app{padding:9px}.bigtime{font-size:70px}}
</style></head><body><div class="app"><section class="top"><div><h1>TV Dashboard</h1><p class="sub">Fullscreen-Board für Firma/TV: Uhr, Wetter, Termine, Nachrichten und Diashow.</p></div><div><button id="fs" class="primary">Fullscreen</button> <a class="primary" style="padding:11px 14px;border-radius:13px" href="../">Hub</a></div></section><main class="grid"><section class="card"><div class="head"><h2>Uhr & Status</h2><button id="weatherBtn" class="primary">Wetter</button></div><div class="body"><div class="bigtime" id="time">--:--</div><div class="date" id="dateOut">--</div><div class="tiles" style="margin-top:18px"><div class="tile"><span>Temperatur</span><b id="tempVal">--°</b></div><div class="tile"><span>Wind</span><b id="windVal">--</b></div><div class="tile"><span>Regen</span><b id="rainVal">--</b></div></div></div></section><section class="card"><div class="head"><h2>Diashow</h2><button id="nextSlide" class="primary">Weiter</button></div><div class="body"><div class="slide"><div><strong id="slideTitle">Willkommen</strong><span id="slideText">Dashboard läuft über GitHub Pages.</span></div></div></div></section><section class="card"><div class="head"><h2>Termine / Hinweise</h2><button id="addEvent" class="primary">Hinzufügen</button></div><div class="body"><div class="form"><input id="eventTitle" placeholder="Titel"><input id="eventTime" placeholder="Zeit"><button id="clearEvents" class="danger">Leeren</button></div><div id="events" class="list" style="margin-top:12px"></div></div></section><section class="card"><div class="head"><h2>News / Meldungen</h2><button id="addNews" class="primary">Hinzufügen</button></div><div class="body"><div class="form"><input id="newsTitle" placeholder="Meldung"><input id="newsText" placeholder="Details"><button id="clearNews" class="danger">Leeren</button></div><div id="news" class="list" style="margin-top:12px"></div></div></section></main></div><script>
const $=id=>document.getElementById(id),key='tvDash.v1';let s={events:[],news:[],slides:[['Willkommen','Dashboard läuft über GitHub Pages.'],['Heute','Wetter, Termine und Hinweise im Überblick.'],['Info','Eigene Meldungen können lokal gespeichert werden.']]},slide=0;function load(){try{s=JSON.parse(localStorage.getItem(key))||s}catch(e){}render()}function save(){localStorage.setItem(key,JSON.stringify(s));render()}function tick(){let d=new Date();time.textContent=d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});dateOut.textContent=d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}setInterval(tick,1000);tick();function render(){events.innerHTML=s.events.length?s.events.map((e,i)=>`<div class=item><div><b>${e.title}</b><small>${e.time}</small></div><button data-i=${i} data-t=e>×</button></div>`).join(''):'<p class=sub>Keine Termine.</p>';news.innerHTML=s.news.length?s.news.map((n,i)=>`<div class=item><div><b>${n.title}</b><small>${n.text}</small></div><button data-i=${i} data-t=n>×</button></div>`).join(''):'<p class=sub>Keine Meldungen.</p>';document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{(b.dataset.t==='e'?s.events:s.news).splice(b.dataset.i,1);save()});let sl=s.slides[slide%s.slides.length];slideTitle.textContent=sl[0];slideText.textContent=sl[1]}async function loadWeather(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(async p=>{try{const lat=p.coords.latitude,lon=p.coords.longitude;const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,precipitation&timezone=auto`);const d=await r.json();tempVal.textContent=Math.round(d.current.temperature_2m)+'°';windVal.textContent=Math.round(d.current.wind_speed_10m)+' km/h';rainVal.textContent=d.current.precipitation+' mm'}catch(e){}})}addEvent.onclick=()=>{if(eventTitle.value){s.events.push({title:eventTitle.value,time:eventTime.value});eventTitle.value=eventTime.value='';save()}};addNews.onclick=()=>{if(newsTitle.value){s.news.push({title:newsTitle.value,text:newsText.value});newsTitle.value=newsText.value='';save()}};clearEvents.onclick=()=>{s.events=[];save()};clearNews.onclick=()=>{s.news=[];save()};nextSlide.onclick=()=>{slide++;render()};setInterval(()=>{slide++;render()},12000);weatherBtn.onclick=loadWeather;fs.onclick=()=>document.documentElement.requestFullscreen?.();load();
</script></body></html>
