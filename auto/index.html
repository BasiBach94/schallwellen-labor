<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Auto Dashboard</title><style>
:root{color-scheme:dark;--bg:#070b10;--panel:rgba(14,24,34,.86);--panel2:rgba(255,255,255,.055);--line:rgba(255,255,255,.14);--text:#f4fbff;--muted:rgba(244,251,255,.68);--blue:#6bd2ff;--green:#70f0a6;--yellow:#ffd36e;--red:#ff6b6b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 8%,rgba(107,210,255,.18),transparent 34%),linear-gradient(145deg,var(--bg),#101922 65%,#030507);color:var(--text)}button,input,select{font:inherit}button{min-height:40px;border:1px solid var(--line);border-radius:13px;padding:0 12px;background:rgba(255,255,255,.075);color:var(--text);font-weight:850}.primary{border:0;color:#04110d;background:linear-gradient(135deg,var(--blue),var(--green))}.danger{background:rgba(255,107,107,.16);border-color:rgba(255,107,107,.35)}a{color:inherit;text-decoration:none}.app{padding:14px;max-width:1220px;margin:auto}.top,.card{border:1px solid var(--line);border-radius:24px;background:var(--panel);backdrop-filter:blur(16px);box-shadow:0 18px 55px rgba(0,0,0,.28)}.top{padding:18px;display:flex;justify-content:space-between;gap:14px;align-items:center}h1{margin:0;font-size:clamp(30px,5vw,54px);letter-spacing:-.05em}.sub{margin:5px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px;margin-top:14px}.card{overflow:hidden}.head{height:54px;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}.head h2{margin:0;font-size:19px}.body{padding:14px}.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.tile,.item{padding:12px;border-radius:16px;background:var(--panel2);border:1px solid rgba(255,255,255,.08)}.tile span,.item span{display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em}.tile b{display:block;margin-top:5px;font-size:24px}.bar{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:9px}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red))}.form{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:8px}.form input,.form select{min-height:40px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06);color:var(--text);padding:0 10px}.list{display:grid;gap:8px}.item{display:flex;justify-content:space-between;gap:10px}.item b{display:block}.item small{color:var(--muted)}.ok{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}@media(max-width:880px){.grid{grid-template-columns:1fr}.tiles{grid-template-columns:1fr 1fr}.form{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}@media(max-width:500px){.tiles,.form{grid-template-columns:1fr}.app{padding:9px}}
</style></head><body><div class="app"><section class="top"><div><h1>Auto Dashboard</h1><p class="sub">BMW 330e: Kilometer, Service, Reifen, Laden, Verbrauch und Wartung.</p></div><a class="primary" style="padding:11px 14px;border-radius:13px" href="../">Hub</a></section><section class="grid"><div class="card"><div class="head"><h2>Fahrzeugstatus</h2><button id="saveSettings" class="primary">Speichern</button></div><div class="body"><div class="tiles"><div class="tile"><span>Kilometer</span><b id="kmOut">--</b></div><div class="tile"><span>Nächster Service</span><b id="serviceOut">--</b><div class="bar"><i id="serviceBar"></i></div></div><div class="tile"><span>HU/AU</span><b id="huOut">--</b></div><div class="tile"><span>Ø Verbrauch</span><b id="avgOut">--</b></div></div><div class="form" style="margin-top:12px"><input id="km" type="number" placeholder="km Stand"><input id="serviceKm" type="number" placeholder="Service bei km"><input id="huDate" type="date"><input id="tireSet" placeholder="Reifen z.B. Sommer"><button id="apply" class="primary">OK</button></div></div></div><div class="card"><div class="head"><h2>Schnelllog</h2><button id="addLog" class="primary">Eintragen</button></div><div class="body"><div class="form"><select id="logType"><option>Laden</option><option>Tanken</option><option>Wäsche</option><option>Werkstatt</option><option>Reifen</option></select><input id="logKm" type="number" placeholder="km"><input id="logAmount" placeholder="kWh/L/€"><input id="logNote" placeholder="Notiz"><button id="clearLogs" class="danger">Leeren</button></div><div id="logs" class="list" style="margin-top:12px"></div></div></div><div class="card"><div class="head"><h2>Wartung & Checks</h2><button id="resetChecks" class="danger">Reset</button></div><div class="body"><div id="checks" class="list"></div></div></div><div class="card"><div class="head"><h2>Reifen & Ausstattung</h2><span id="tireOut" class="sub"></span></div><div class="body"><div class="tiles"><div class="tile"><span>Luftdruck vorn</span><b>2.4 bar</b></div><div class="tile"><span>Luftdruck hinten</span><b>2.6 bar</b></div><div class="tile"><span>Ladekabel</span><b class="ok">prüfen</b></div><div class="tile"><span>Warndreieck</span><b class="ok">an Bord</b></div></div></div></div></section></div><script>
const $=id=>document.getElementById(id),key='carDash.v1';let s={km:'',serviceKm:'',huDate:'',tireSet:'',logs:[],checks:{}};const checkNames=['Ölstand prüfen','Kühlmittel prüfen','Wischwasser auffüllen','Reifendruck prüfen','Ladekabel Sichtprüfung','Innenraumfilter merken','Versicherung/Dokumente prüfen'];function load(){try{s=JSON.parse(localStorage.getItem(key))||s}catch(e){};['km','serviceKm','huDate','tireSet'].forEach(id=>$(id).value=s[id]||'');render()}function save(){localStorage.setItem(key,JSON.stringify(s));render()}function days(d){return d?Math.ceil((new Date(d)-new Date())/86400000):null}function render(){kmOut.textContent=s.km?Number(s.km).toLocaleString('de-DE')+' km':'--';let left=s.serviceKm&&s.km?Number(s.serviceKm)-Number(s.km):null;serviceOut.textContent=left==null?'--':left<=0?'fällig':left.toLocaleString('de-DE')+' km';serviceOut.className=left!=null&&left<1500?'warn':'';serviceBar.style.width=left==null?0:Math.max(0,Math.min(100,100-left/15000*100))+'%';let hu=days(s.huDate);huOut.textContent=hu==null?'--':hu<0?'überfällig':hu+' Tage';huOut.className=hu!=null&&hu<30?'warn':'';tireOut.textContent=s.tireSet||'Reifensatz nicht gesetzt';const fuel=s.logs.filter(l=>l.type==='Tanken'&&parseFloat(l.amount));avgOut.textContent=fuel.length?fuel[fuel.length-1].amount:'--';logs.innerHTML=s.logs.length?s.logs.slice().reverse().map((l,i)=>`<div class=item><div><b>${l.type} · ${l.km||'--'} km</b><small>${l.amount||''} ${l.note||''}</small></div><small>${new Date(l.ts).toLocaleDateString()}</small></div>`).join(''):'<p class=sub>Noch keine Einträge.</p>';checks.innerHTML=checkNames.map(c=>`<label class=item><div><b>${c}</b><small>${s.checks[c]?'erledigt':'offen'}</small></div><input type=checkbox ${s.checks[c]?'checked':''} data-c="${c}"></label>`).join('');checks.querySelectorAll('input').forEach(x=>x.onchange=()=>{s.checks[x.dataset.c]=x.checked;save()})}apply.onclick=()=>{['km','serviceKm','huDate','tireSet'].forEach(id=>s[id]=$(id).value);save()};saveSettings.onclick=apply.onclick;addLog.onclick=()=>{s.logs.push({type:logType.value,km:logKm.value,amount:logAmount.value,note:logNote.value,ts:new Date().toISOString()});logKm.value=logAmount.value=logNote.value='';save()};clearLogs.onclick=()=>{if(confirm('Logs löschen?')){s.logs=[];save()}};resetChecks.onclick=()=>{s.checks={};save()};load();
</script></body></html>
