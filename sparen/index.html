<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Sparen Dashboard</title><style>
:root{color-scheme:dark;--bg:#06100d;--panel:rgba(12,30,24,.86);--panel2:rgba(255,255,255,.055);--line:rgba(255,255,255,.14);--text:#f1fff8;--muted:rgba(241,255,248,.68);--green:#70f0a6;--blue:#6bd2ff;--yellow:#ffd36e;--red:#ff6b6b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 8%,rgba(112,240,166,.18),transparent 34%),linear-gradient(145deg,var(--bg),#0f2019 65%,#030705);color:var(--text)}button,input{font:inherit}button{min-height:40px;border:1px solid var(--line);border-radius:13px;padding:0 12px;background:rgba(255,255,255,.075);color:var(--text);font-weight:850}.primary{border:0;color:#04110d;background:linear-gradient(135deg,var(--green),var(--blue))}.danger{background:rgba(255,107,107,.16);border-color:rgba(255,107,107,.35)}a{color:inherit;text-decoration:none}.app{max-width:1220px;margin:auto;padding:14px}.top,.card{border:1px solid var(--line);border-radius:24px;background:var(--panel);box-shadow:0 18px 55px rgba(0,0,0,.3);overflow:hidden}.top{padding:18px;display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:0;font-size:clamp(30px,5vw,54px);letter-spacing:-.05em}.sub{color:var(--muted);margin:5px 0 0}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:14px}.head{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.08)}.head h2{margin:0;font-size:19px}.body{padding:14px}.big{font-size:clamp(54px,10vw,110px);line-height:.95;letter-spacing:-.07em;margin:10px 0}.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.tile,.item{padding:12px;border-radius:16px;background:var(--panel2);border:1px solid rgba(255,255,255,.08)}.tile span{display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em}.tile b{display:block;margin-top:5px;font-size:22px}.bar{height:16px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:12px}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--blue),var(--yellow))}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.form input{min-height:40px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06);color:var(--text);padding:0 10px}.list{display:grid;gap:8px}.item{display:flex;justify-content:space-between;gap:10px}.item small{color:var(--muted)}@media(max-width:850px){.grid{grid-template-columns:1fr}.tiles,.form{grid-template-columns:1fr 1fr}.top{flex-direction:column;align-items:flex-start}}@media(max-width:500px){.tiles,.form{grid-template-columns:1fr}.app{padding:9px}}
</style></head><body><div class="app"><section class="top"><div><h1>Sparen Dashboard</h1><p class="sub">Sparziel, Monatsfortschritt, Einzahlungen und Zieltracking lokal verwalten.</p></div><a class="primary" style="padding:11px 14px;border-radius:13px" href="../">Hub</a></section><section class="grid"><div class="card"><div class="head"><h2>Ziel</h2><button id="saveSettings" class="primary">Speichern</button></div><div class="body"><div class="form"><input id="goal" type="number" placeholder="Ziel €"><input id="start" type="number" placeholder="Start €"><input id="monthly" type="number" placeholder="Monatlich €"><input id="deadline" type="date"></div><div class="big" id="progressText">0%</div><div class="bar"><i id="progressBar"></i></div><div class="tiles" style="margin-top:14px"><div class="tile"><span>Gesamt</span><b id="totalOut">0 €</b></div><div class="tile"><span>Rest</span><b id="leftOut">0 €</b></div><div class="tile"><span>Pro Monat nötig</span><b id="needOut">--</b></div></div></div></div><div class="card"><div class="head"><h2>Einzahlung</h2><button id="add" class="primary">Eintragen</button></div><div class="body"><div class="form"><input id="date" type="date"><input id="amount" type="number" placeholder="€"><input id="source" placeholder="Quelle"><button id="clear" class="danger">Leeren</button></div><div id="logs" class="list" style="margin-top:12px"></div></div></div><div class="card"><div class="head"><h2>Routinen</h2><span class="sub">Plan</span></div><div class="body"><div class="tiles"><div class="tile"><span>Bitcoin</span><b>10 €/Woche</b></div><div class="tile"><span>ETFs</span><b>600 €/Monat</b></div><div class="tile"><span>Tagesgeld</span><b>500 €/Monat</b></div></div></div></div><div class="card"><div class="head"><h2>Quartalscheck</h2><span class="sub">Notiz</span></div><div class="body"><div id="quarter" class="list"></div></div></div></section></div><script>
const $=id=>document.getElementById(id),key='savingDash.v1';let s={goal:20000,start:0,monthly:500,deadline:'',logs:[]};function load(){try{s=JSON.parse(localStorage.getItem(key))||s}catch(e){};['goal','start','monthly','deadline'].forEach(id=>$(id).value=s[id]||'');date.value=new Date().toISOString().slice(0,10);render()}function save(){localStorage.setItem(key,JSON.stringify(s));render()}function monthsLeft(){if(!s.deadline)return null;let a=new Date(),b=new Date(s.deadline);return Math.max(1,(b.getFullYear()-a.getFullYear())*12+b.getMonth()-a.getMonth())}function render(){let total=Number(s.start||0)+s.logs.reduce((a,l)=>a+Number(l.amount||0),0),goal=Number(s.goal||0),left=Math.max(0,goal-total),pct=goal?Math.min(100,total/goal*100):0;progressText.textContent=pct.toFixed(1)+'%';progressBar.style.width=pct+'%';totalOut.textContent=total.toFixed(2)+' €';leftOut.textContent=left.toFixed(2)+' €';let m=monthsLeft();needOut.textContent=m?(left/m).toFixed(0)+' €':'--';logs.innerHTML=s.logs.length?s.logs.slice().reverse().map(l=>`<div class=item><div><b>${Number(l.amount).toFixed(2)} €</b><small>${l.source||'Einzahlung'} · ${l.date}</small></div></div>`).join(''):'<p class=sub>Noch keine Einzahlungen.</p>';let qs=['Q1 Portfolio prüfen','Q2 Rebalancing anschauen','Q3 Sparrate checken','Q4 Jahresziel auswerten'];quarter.innerHTML=qs.map(q=>`<div class=item><b>${q}</b><small>offen</small></div>`).join('')}saveSettings.onclick=()=>{['goal','start','monthly','deadline'].forEach(id=>s[id]=$(id).value);save()};add.onclick=()=>{s.logs.push({date:date.value,amount:amount.value,source:source.value});amount.value=source.value='';save()};clear.onclick=()=>{if(confirm('Einzahlungen löschen?')){s.logs=[];save()}};load();
</script></body></html>
