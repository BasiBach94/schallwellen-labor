<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>RideSensorLogger</title><style>:root{color-scheme:dark;--a:#6bd2ff;--b:#70f0a6;--bg:#050b10;--panel:rgba(12,24,34,.9);--line:rgba(255,255,255,.15);--text:#f4fbff;--muted:rgba(244,251,255,.68);--red:#ff6b6b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 14% 8%,color-mix(in srgb,var(--a) 26%,transparent),transparent 34%),linear-gradient(145deg,var(--bg),#0b1720 65%,#030608);color:var(--text)}button{font:inherit;min-height:42px;border:1px solid var(--line);border-radius:15px;padding:0 12px;background:rgba(255,255,255,.075);color:var(--text);font-weight:850}.primary{border:0;color:#04110d;background:linear-gradient(135deg,var(--a),var(--b))}.danger{background:rgba(255,107,107,.16);border-color:rgba(255,107,107,.36)}.app{padding:10px;display:grid;gap:10px}.hero,.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(145deg,rgba(13,28,39,.9),rgba(7,15,22,.92));box-shadow:0 22px 70px rgba(0,0,0,.34);overflow:hidden}.hero{padding:14px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand{display:flex;gap:12px;align-items:center}.icon{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--a),var(--b));color:#04110d;font-size:30px;font-weight:950}h1{margin:0;font-size:clamp(30px,7vw,58px);line-height:.95;letter-spacing:-.06em}.sub{margin:5px 0 0;color:var(--muted);font-size:13px}.actions,.modes{display:flex;gap:8px;flex-wrap:wrap}.modes{margin-top:12px}.modes button.active{border:0;color:#04110d;background:linear-gradient(135deg,var(--a),var(--b))}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}.card{grid-column:span 6}.wide{grid-column:span 12}.head{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid rgba(255,255,255,.08)}.head h2{margin:0;font-size:18px}.body{padding:12px}.speed{font-size:clamp(82px,18vw,170px);line-height:.85;letter-spacing:-.08em}.unit{color:var(--muted);font-weight:900;letter-spacing:.16em}.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tile{padding:12px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}.tile span{display:block;color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.075em}.tile b{display:block;margin-top:5px;font-size:22px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:rgba(244,251,255,.88);font-size:12px;margin-top:6px}.log{max-height:180px;overflow:auto;display:grid;gap:7px}.entry{padding:9px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);font-size:13px}.entry small{display:block;color:var(--muted);margin-top:3px}.rec{color:var(--red)!important}.ok{color:var(--b)!important}@media(max-width:800px){.card{grid-column:span 12}.tiles{grid-template-columns:1fr 1fr}.top{flex-direction:column}.actions button,.modes button{flex:1}}@media(max-width:430px){.tiles{grid-template-columns:1fr}.app{padding:8px}.speed{font-size:86px}}</style></head><body><div class="app"><section class="hero"><div class="top"><div class="brand"><div id="modeIcon" class="icon">🏍</div><div><h1>RideSensorLogger</h1><p id="tagline" class="sub">Moped-Modus</p></div></div><div class="actions"><button id="rec" class="primary">Aufnahme</button><button id="marker">Marker</button><button id="exportJson">JSON</button><button id="exportCsv">CSV</button><button id="exportGpx">GPX</button></div></div><div class="modes"><button data-mode="moped" class="active">🏍 Moped</button><button data-mode="auto">🚗 Auto</button><button data-mode="wandern">🥾 Wandern</button><button data-mode="skate">🛹 Skateboard</button></div></section><section class="grid"><article class="card"><div class="head"><h2>Speed</h2><span id="recState" class="sub">bereit</span></div><div class="body"><span id="speed" class="speed">--</span><div class="unit">km/h</div></div></article><article class="card"><div class="head"><h2>Tour</h2><span id="gpsState" class="sub">GPS wartet</span></div><div class="body"><div class="tiles"><div class="tile"><span>Distanz</span><b id="distanceOut">0.00 km</b></div><div class="tile"><span>Zeit</span><b id="time">00:00</b></div><div class="tile"><span>Höhe</span><b id="alt">--</b></div><div class="tile"><span>Genauigkeit</span><b id="acc">--</b></div></div></div></article><article class="card wide"><div class="head"><h2>Bewegung</h2><span id="sampleCount" class="sub">0 Samples</span></div><div class="body"><div class="tiles"><div class="tile"><span>Beschleunigung</span><b id="accelMag">--</b><div id="accelRaw" class="mono">--</div></div><div class="tile"><span>Gyro</span><b id="gyroMag">--</b><div id="gyroRaw" class="mono">--</div></div><div class="tile"><span>Linear</span><b id="linearMag">--</b><div id="linearRaw" class="mono">--</div></div><div class="tile"><span>Kurs</span><b id="course">--</b><div id="magRaw" class="mono">--</div></div></div></div></article><article class="card"><div class="head"><h2>Position</h2><span class="sub">Live</span></div><div class="body"><div class="tiles"><div class="tile"><span>Lat</span><b id="lat">--</b></div><div class="tile"><span>Lon</span><b id="lon">--</b></div><div class="tile"><span>Speed GPS</span><b id="gpsSpeed">--</b></div><div class="tile"><span>Marker</span><b id="markers">0</b></div></div></div></article><article class="card"><div class="head"><h2>Ereignisse</h2><button id="clear" class="danger">Reset</button></div><div class="body"><div id="log" class="log"></div></div></article></section></div><script>let mode='moped',recording=false,start=0,last=null,prev=null,distanceMeters=0,samples=[],marks=[];const $=id=>document.getElementById(id);const modes={moped:{icon:'🏍',a:'#6bd2ff',b:'#70f0a6',t:'Moped-Modus'},auto:{icon:'🚗',a:'#ffd36e',b:'#6bd2ff',t:'Auto-Modus'},wandern:{icon:'🥾',a:'#70f0a6',b:'#ffd36e',t:'Wandern-Modus'},skate:{icon:'🛹',a:'#a78bfa',b:'#ff9f43',t:'Skateboard-Modus'}};function setMode(m){mode=m;let x=modes[m];document.documentElement.style.setProperty('--a',x.a);document.documentElement.style.setProperty('--b',x.b);modeIcon.textContent=x.icon;tagline.textContent=x.t;document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));addLog('Modus',x.t)}document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));function mag(a){return Math.sqrt((a[0]||0)**2+(a[1]||0)**2+(a[2]||0)**2)}function raw(a){return a.slice(0,3).map(v=>Number(v).toFixed(2)).join(' · ')}function fmt(v,d=1){return v==null?'--':Number(v).toFixed(d)}function hav(a,b){const R=6371000,rad=x=>x*Math.PI/180,dLat=rad(b.lat-a.lat),dLon=rad(b.lon-a.lon);const h=Math.sin(dLat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(h))}function tick(){if(recording)time.textContent=format(Date.now()-start)}function format(ms){let s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);s%=60;m%=60;return h? h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0') : String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}setInterval(tick,500);window.onRideUpdate=d=>{last=d;let loc=d.location;if(loc){gpsState.textContent='GPS aktiv';gpsState.className='sub ok';speed.textContent=loc.speed==null?'--':Math.round(loc.speed);gpsSpeed.textContent=loc.speed==null?'--':fmt(loc.speed,1);alt.textContent=loc.alt==null?'--':fmt(loc.alt,0)+' m';acc.textContent=loc.accuracy==null?'--':fmt(loc.accuracy,0)+' m';lat.textContent=fmt(loc.lat,5);lon.textContent=fmt(loc.lon,5);course.textContent=loc.bearing==null?'--':fmt(loc.bearing,0)+'°';if(recording){if(prev){let dd=hav(prev,loc);if(dd<120)distanceMeters+=dd}prev=loc;distanceOut.textContent=(distanceMeters/1000).toFixed(2)+' km'}}else gpsState.textContent='kein GPS';let am=mag(d.accel),gm=mag(d.gyro),lm=mag(d.linear);accelMag.textContent=fmt(am,2)+' m/s²';gyroMag.textContent=fmt(gm,2)+' rad/s';linearMag.textContent=fmt(lm,2)+' m/s²';accelRaw.textContent=raw(d.accel);gyroRaw.textContent=raw(d.gyro);linearRaw.textContent=raw(d.linear);magRaw.textContent=raw(d.magnetic);if(recording){samples.push(d);if(samples.length>5000)samples.shift();sampleCount.textContent=samples.length+' Samples'}};function addLog(t,m){log.innerHTML='<div class="entry"><b>'+t+'</b><small>'+new Date().toLocaleTimeString()+' · '+m+'</small></div>'+log.innerHTML}rec.onclick=()=>{recording=!recording;NativeRide.setRunning(true);if(recording){start=Date.now();prev=null;samples=[];distanceMeters=0;marks=[];rec.textContent='Stop';rec.className='danger';recState.textContent='REC';recState.className='sub rec';addLog('Aufnahme','gestartet')}else{rec.textContent='Aufnahme';rec.className='primary';recState.textContent='bereit';recState.className='sub';addLog('Aufnahme','gestoppt')}};marker.onclick=()=>{if(!last)return;marks.push({time:Date.now(),mode:mode,location:last.location});markers.textContent=marks.length;addLog('Marker',mode)};clear.onclick=()=>{samples=[];marks=[];distanceMeters=0;start=Date.now();markers.textContent='0';sampleCount.textContent='0 Samples';distanceOut.textContent='0.00 km';log.innerHTML=''};function dl(name,type,txt){let a=document.createElement('a'),u=URL.createObjectURL(new Blob([txt],{type:type}));a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}function base(){return 'ride-'+mode+'-'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}exportJson.onclick=()=>dl(base()+'.json','application/json',JSON.stringify({mode:mode,distanceMeters:distanceMeters,marks:marks,samples:samples},null,2));exportCsv.onclick=()=>{let rows=['time,mode,lat,lon,speed,alt,accel,gyro,linear'];samples.forEach(s=>{let l=s.location||{};rows.push([s.time,mode,l.lat||'',l.lon||'',l.speed||'',l.alt||'',raw(s.accel),raw(s.gyro),raw(s.linear)].join(','))});dl(base()+'.csv','text/csv',rows.join('\n'))};exportGpx.onclick=()=>{let pts=samples.filter(s=>s.location).map(s=>'<trkpt lat="'+s.location.lat+'" lon="'+s.location.lon+'"><time>'+new Date(s.time).toISOString()+'</time></trkpt>').join('');dl(base()+'.gpx','application/gpx+xml','<?xml version="1.0"?><gpx version="1.1" creator="RideSensorLogger"><trk><name>'+mode+'</name><trkseg>'+pts+'</trkseg></trk></gpx>')};setMode('moped');</script></body></html>
