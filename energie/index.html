<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Energie Dashboard</title><style>
:root{color-scheme:dark;--bg:#090b10;--panel:rgba(22,20,34,.86);--panel2:rgba(255,255,255,.055);--line:rgba(255,255,255,.14);--text:#fbf7ff;--muted:rgba(251,247,255,.68);--blue:#6bd2ff;--green:#70f0a6;--yellow:#ffd36e;--red:#ff6b6b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 8%,rgba(255,211,110,.16),transparent 34%),radial-gradient(circle at 85% 20%,rgba(107,210,255,.16),transparent 34%),linear-gradient(145deg,var(--bg),#191322 65%,#030407);color:var(--text)}button,input{font:inherit}button{min-height:40px;border:1px solid var(--line);border-radius:13px;padding:0 12px;background:rgba(255,255,255,.075);color:var(--text);font-weight:850}.primary{border:0;color:#07110d;background:linear-gradient(135deg,var(--yellow),var(--green))}.danger{background:rgba(255,107,107,.16);border-color:rgba(255,107,107,.35)}a{color:inherit;text-decoration:none}.app{max-width:1220px;margin:auto;padding:14px}.top,.card{border:1px solid var(--line);border-radius:24px;background:var(--panel);box-shadow:0 18px 55px rgba(0,0,0,.3);overflow:hidden}.top{padding:18px;display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:0;font-size:clamp(30px,5vw,54px);letter-spacing:-.05em}.sub{color:var(--muted);margin:5px 0 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.wide{grid-column:1/-1}.head{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.08)}.head h2{margin:0;font-size:19px}.body{padding:14px}.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.tile,.item{padding:12px;border-radius:16px;background:var(--panel2);border:1px solid rgba(255,255,255,.08)}.tile span{display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em}.tile b{display:block;margin-top:5px;font-size:24px}.form{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.form input{min-height:40px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06);color:var(--text);padding:0 10px}.list{display:grid;gap:8px}.item{display:flex;justify-content:space-between;gap:10px}.item small{color:var(--muted)}.bar{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:9px}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red))}.ok{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}@media(max-width:850px){.grid{grid-template-columns:1fr}.tiles,.form{grid-template-columns:1fr 1fr}.top{flex-direction:column;align-items:flex-start}}@media(max-width:500px){.tiles,.form{grid-template-columns:1fr}.app{padding:9px}}
</style></head><body><div class="app"><section class="top"><div><h1>Energie Dashboard</h1><p class="sub">Heizung, Strom, Raumklima, Kosten und Sparmaßnahmen lokal tracken.</p></div><a class="primary" style="padding:11px 14px;border-radius:13px" href="../">Hub</a></section><section class="grid"><div class="card wide"><div class="head"><h2>Übersicht</h2><button id="saveSettings" class="primary">Speichern</button></div><div class="body"><div class="tiles"><div class="tile"><span>Strompreis</span><b id="priceOut">--</b></div><div class="tile"><span>Monat kWh</span><b id="monthKwh">0</b></div><div class="tile"><span>Monatskosten</span><b id="costOut">0 €</b></div><div class="tile"><span>Heizmodus</span><b id="modeOut">--</b></div></div><div class="form" style="margin-top:12px"><input id="price" type="number" step="0.01" placeholder="€/kWh"><input id="targetTemp" type="number" step="0.5" placeholder="Ziel °C"><input id="mode" placeholder="Modus"><input id="room" placeholder="Raum"><button class="primary">OK</button></div></div></div><div class="card"><div class="head"><h2>Verbrauch eintragen</h2><button id="add" class="primary">Eintragen</button></div><div class="body"><div class="form"><input id="date" type="date"><input id="kwh" type="number" step="0.1" placeholder="kWh"><input id="temp" type="number" step="0.1" placeholder="Raum °C"><input id="note" placeholder="Notiz"><button id="clear" class="danger">Leeren</button></div><div id="logs" class="list" style="margin-top:12px"></div></div></div><div class="card"><div class="head"><h2>Sparmaßnahmen</h2><button id="resetChecks" class="danger">Reset</button></div><div class="body"><div id="checks" class="list"></div></div></div></section></div><script>
const $=id=>document.getElementById(id),key='energyDash.v1';let s={price:'0.35',targetTemp:'20',mode:'Normal',room:'Wohnung',logs:[],checks:{}};const checks=['Stoßlüften statt Kipplüften','Heizkörper freihalten','Türen zwischen Räumen schließen','Nachtabsenkung prüfen','Fensterdichtungen prüfen','Warmwasserzeiten prüfen','Standby-Verbrauch reduzieren'];function load(){try{s=JSON.parse(localStorage.getItem(key))||s}catch(e){};['price','targetTemp','mode','room'].forEach(id=>$(id).value=s[id]||'');date.value=new Date().toISOString().slice(0,10);render()}function save(){localStorage.setItem(key,JSON.stringify(s));render()}function render(){priceOut.textContent=Number(s.price||0).toFixed(2)+' €/kWh';modeOut.textContent=s.mode||'--';let month=new Date().toISOString().slice(0,7),sum=s.logs.filter(l=>(l.date||'').startsWith(month)).reduce((a,l)=>a+Number(l.kwh||0),0);monthKwh.textContent=sum.toFixed(1);costOut.textContent=(sum*Number(s.price||0)).toFixed(2)+' €';logs.innerHTML=s.logs.length?s.logs.slice().reverse().map(l=>`<div class=item><div><b>${l.date} · ${l.kwh} kWh</b><small>${l.temp?l.temp+' °C · ':''}${l.note||''}</small></div><small>${(Number(l.kwh||0)*Number(s.price||0)).toFixed(2)} €</small></div>`).join(''):'<p class=sub>Noch keine Einträge.</p>';checksEl()}function checksEl(){checks.innerHTML=checks.map(c=>`<label class=item><div><b>${c}</b><small>${s.checks[c]?'aktiv':'offen'}</small></div><input type=checkbox ${s.checks[c]?'checked':''} data-c="${c}"></label>`).join('');checks.querySelectorAll('input').forEach(x=>x.onchange=()=>{s.checks[x.dataset.c]=x.checked;save()})}saveSettings.onclick=()=>{['price','targetTemp','mode','room'].forEach(id=>s[id]=$(id).value);save()};add.onclick=()=>{s.logs.push({date:date.value,kwh:kwh.value,temp:temp.value,note:note.value});kwh.value=temp.value=note.value='';save()};clear.onclick=()=>{if(confirm('Verbrauchslog löschen?')){s.logs=[];save()}};resetChecks.onclick=()=>{s.checks={};save()};load();
</script></body></html>
