name: Build RideSensorLogger APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'ride-sensor-logger/**'
      - '.github/workflows/build-ride-sensor-logger.yml'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: ride-sensor-logger
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RideSensorLogger-debug-apk
          path: ride-sensor-logger/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to downloads folder
        run: |
          mkdir -p downloads
          cp ride-sensor-logger/app/build/outputs/apk/debug/app-debug.apk downloads/RideSensorLogger-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/RideSensorLogger-debug.apk
          git commit -m "Publish RideSensorLogger debug APK" || echo "No APK changes to commit"
          git push
