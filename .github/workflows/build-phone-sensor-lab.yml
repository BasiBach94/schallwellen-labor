name: Build PhoneSensorLab APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'phone-sensor-lab/**'
      - '.github/workflows/build-phone-sensor-lab.yml'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: phone-sensor-lab
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoneSensorLab-debug-apk
          path: phone-sensor-lab/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to downloads folder
        run: |
          mkdir -p downloads
          cp phone-sensor-lab/app/build/outputs/apk/debug/app-debug.apk downloads/PhoneSensorLab-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/PhoneSensorLab-debug.apk
          git commit -m "Publish PhoneSensorLab debug APK" || echo "No APK changes to commit"
          git push
