name: Build PhoneSensorLab APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'phone-sensor-lab/**'
      - '.github/workflows/build-phone-sensor-lab.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: phone-sensor-lab
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneSensorLab-debug-apk
          path: phone-sensor-lab/app/build/outputs/apk/debug/app-debug.apk
