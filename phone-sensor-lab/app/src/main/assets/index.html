<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>PhoneSensorLab</title><style>
:root{color-scheme:dark;--bg:#050b10;--panel:rgba(12,24,34,.88);--panel2:rgba(255,255,255,.055);--line:rgba(255,255,255,.14);--text:#f4fbff;--muted:rgba(244,251,255,.68);--green:#70f0a6;--blue:#6bd2ff;--yellow:#ffd36e;--red:#ff6b6b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 8%,rgba(107,210,255,.18),transparent 34%),linear-gradient(145deg,var(--bg),#0b1720 65%,#030608);color:var(--text)}button,select{font:inherit}button,select{min-height:40px;border:1px solid var(--line);border-radius:13px;padding:0 12px;background:rgba(255,255,255,.075);color:var(--text);font-weight:850}.primary{border:0;color:#04110d;background:linear-gradient(135deg,var(--blue),var(--green))}.app{padding:12px;display:grid;gap:12px}.top,.card{border:1px solid var(--line);border-radius:22px;background:var(--panel);box-shadow:0 18px 55px rgba(0,0,0,.28);overflow:hidden}.top{padding:14px;display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:0;font-size:clamp(28px,6vw,50px);letter-spacing:-.05em}.sub{margin:4px 0 0;color:var(--muted);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.card{grid-column:span 6}.card.wide{grid-column:span 12}.head{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid rgba(255,255,255,.08)}.head h2{margin:0;font-size:18px}.body{padding:12px}.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tile,.sensor{padding:11px;border-radius:15px;background:var(--panel2);border:1px solid rgba(255,255,255,.08)}.tile span,.sensor span{display:block;color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.07em}.tile b{display:block;margin-top:5px;font-size:22px}.sensor b{display:block;margin-top:5px;font-size:15px}.values{margin-top:6px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:rgba(244,251,255,.86);font-size:12px;word-break:break-word}.list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.ok{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}@media(max-width:820px){.card{grid-column:span 12}.tiles,.list{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}}@media(max-width:430px){.tiles,.list{grid-template-columns:1fr}.app{padding:8px}.actions button,.actions select{flex:1}}
</style></head><body><div class="app"><section class="top"><div><h1>PhoneSensorLab</h1><p class="sub">Live-Sensorik deines Android-Handys: Sensoren, GPS, Akku, Gerät und Netzwerk.</p></div><div class="actions"><button id="pause" class="primary">Pause</button><select id="rate"><option value="normal">Normal</option><option value="slow">Langsam</option><option value="fast">Schnell</option><option value="max">Max</option></select><button id="share">JSON</button><button id="loc">GPS</button></div></section><section class="grid"><article class="card wide"><div class="head"><h2>Gerät</h2><span id="count" class="sub">0 Sensoren</span></div><div class="body"><div class="tiles"><div class="tile"><span>Modell</span><b id="model">--</b></div><div class="tile"><span>Android</span><b id="android">--</b></div><div class="tile"><span>Akku</span><b id="battery">--</b></div><div class="tile"><span>Netz</span><b id="network">--</b></div></div></div></article><article class="card"><div class="head"><h2>GPS</h2><span id="gpsState" class="sub">wartet</span></div><div class="body"><div class="tiles"><div class="tile"><span>Lat</span><b id="lat">--</b></div><div class="tile"><span>Lon</span><b id="lon">--</b></div><div class="tile"><span>Speed</span><b id="speed">--</b></div><div class="tile"><span>Genauigkeit</span><b id="acc">--</b></div></div></div></article><article class="card"><div class="head"><h2>Top Sensoren</h2><span id="updated" class="sub">--</span></div><div class="body"><div id="topSensors" class="list"></div></div></article><article class="card wide"><div class="head"><h2>Alle Sensoren</h2><span class="sub">Livewerte</span></div><div class="body"><div id="sensors" class="list"></div></div></article></section></div><script>
let last=null,running=true;const $=id=>document.getElementById(id);function fmt(v,d=2){return v==null?'--':Number(v).toFixed(d)}function vals(a){return !a||!a.length?'--':a.map(x=>Number(x).toFixed(3)).join(' · ')}function groupName(t){const m={1:'Accelerometer',2:'Magnetometer',3:'Orientation',4:'Gyroscope',5:'Light',6:'Pressure',8:'Proximity',9:'Gravity',10:'Linear Accel',11:'Rotation',18:'Step Detector',19:'Step Counter'};return m[t]||('Typ '+t)}function sensorCard(s){return `<div class="sensor"><span>${groupName(s.type)}</span><b>${s.name}</b><div class="values">${vals(s.values)}</div><div class="values">Range ${fmt(s.range,1)} · Res ${fmt(s.resolution,4)} · ${s.vendor}</div></div>`}window.onNativeSensorUpdate=function(d){last=d;model.textContent=(d.device.manufacturer+' '+d.device.model).trim();android.textContent=d.device.android+' / SDK '+d.device.sdk;battery.textContent=d.device.battery+'%'+(d.device.charging?' ⚡':'');network.textContent=d.device.network;count.textContent=d.sensors.length+' Sensoren';if(d.location){gpsState.textContent='aktiv';gpsState.className='sub ok';lat.textContent=fmt(d.location.lat,5);lon.textContent=fmt(d.location.lon,5);speed.textContent=fmt(d.location.speed,1)+' km/h';acc.textContent=fmt(d.location.accuracy,0)+' m'}else{gpsState.textContent='kein Fix';gpsState.className='sub warn'}updated.textContent=new Date().toLocaleTimeString();let active=d.sensors.filter(s=>s.values&&s.values.length).slice(0,6);topSensors.innerHTML=active.map(sensorCard).join('')||'<p class=sub>Noch keine Livewerte.</p>';sensors.innerHTML=d.sensors.map(sensorCard).join('')};pause.onclick=()=>{running=!running;pause.textContent=running?'Pause':'Start';AndroidBridge.setRunning(running)};rate.onchange=()=>AndroidBridge.setRate(rate.value);loc.onclick=()=>AndroidBridge.openLocationSettings();share.onclick=()=>{const txt=AndroidBridge.snapshot();navigator.clipboard&&navigator.clipboard.writeText(txt);alert('JSON in Zwischenablage kopiert, falls vom System erlaubt.');};
</script></body></html>
