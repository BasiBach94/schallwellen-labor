<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PhoneSensorLab</title>
<style>
:root{color-scheme:dark;--bg:#04080d;--bg2:#0a1620;--panel:rgba(9,20,29,.82);--panel2:rgba(255,255,255,.06);--line:rgba(255,255,255,.13);--text:#f4fbff;--muted:rgba(244,251,255,.66);--green:#70f0a6;--blue:#6bd2ff;--purple:#a78bfa;--yellow:#ffd36e;--red:#ff6b6b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 15% 6%,rgba(107,210,255,.22),transparent 32%),radial-gradient(circle at 85% 12%,rgba(112,240,166,.15),transparent 34%),linear-gradient(145deg,var(--bg),var(--bg2) 62%,#030608);color:var(--text)}button,select{font:inherit}button,select{min-height:42px;border:1px solid var(--line);border-radius:15px;padding:0 13px;background:rgba(255,255,255,.075);color:var(--text);font-weight:850}.primary{border:0;color:#04110d;background:linear-gradient(135deg,var(--blue),var(--green))}.app{padding:12px;display:grid;gap:12px}.hero,.card{border:1px solid var(--line);border-radius:26px;background:linear-gradient(145deg,rgba(13,28,39,.88),rgba(7,15,22,.9));box-shadow:0 22px 70px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.08);overflow:hidden;backdrop-filter:blur(16px)}.hero{position:relative;padding:16px}.hero:before{content:"";position:absolute;right:-70px;top:-90px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(112,240,166,.17),transparent 68%)}.top{position:relative;display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--blue),var(--green));color:#04110d;font-size:27px;font-weight:950;box-shadow:0 18px 40px rgba(107,210,255,.18)}h1{margin:0;font-size:clamp(30px,7vw,56px);line-height:.95;letter-spacing:-.06em}.sub{margin:5px 0 0;color:var(--muted);font-size:13px;line-height:1.4}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.statusLine{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.pulse{padding:10px;border:1px solid rgba(255,255,255,.09);border-radius:18px;background:rgba(255,255,255,.045)}.pulse span{display:block;color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.pulse b{display:block;margin-top:4px;font-size:18px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.card{grid-column:span 6}.card.wide{grid-column:span 12}.head{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 13px;border-bottom:1px solid rgba(255,255,255,.08);background:linear-gradient(90deg,rgba(255,255,255,.045),rgba(255,255,255,.01))}.head h2{margin:0;font-size:18px}.pill{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border:1px solid rgba(255,255,255,.11);border-radius:999px;padding:5px 8px;background:rgba(255,255,255,.04)}.body{padding:12px}.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tile,.sensor{position:relative;padding:12px;border-radius:18px;background:var(--panel2);border:1px solid rgba(255,255,255,.08);overflow:hidden}.tile:before,.sensor:before{content:"";position:absolute;right:-36px;top:-36px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,var(--accent,rgba(107,210,255,.12)),transparent 68%)}.tile span,.sensor span{position:relative;display:block;color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.075em}.tile b{position:relative;display:block;margin-top:5px;font-size:22px;line-height:1.05}.sensor b{position:relative;display:block;margin-top:6px;font-size:15px;line-height:1.2}.values{position:relative;margin-top:7px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:rgba(244,251,255,.88);font-size:12px;line-height:1.35;word-break:break-word}.meta{position:relative;color:var(--muted);font-size:11px}.list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.sensor.motion{--accent:rgba(107,210,255,.18)}.sensor.env{--accent:rgba(112,240,166,.18)}.sensor.pos{--accent:rgba(167,139,250,.18)}.sensor.other{--accent:rgba(255,211,110,.16)}.ok{color:var(--green)!important}.warn{color:var(--yellow)!important}.bad{color:var(--red)!important}.bars{display:grid;gap:6px;margin-top:8px}.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green),var(--yellow))}.empty{color:var(--muted);padding:12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
@media(max-width:820px){.card{grid-column:span 12}.tiles,.list,.statusLine{grid-template-columns:1fr 1fr}.top{flex-direction:column}.actions{justify-content:flex-start}.actions button,.actions select{flex:1}.brand{align-items:flex-start}}@media(max-width:440px){.app{padding:8px}.hero,.card{border-radius:22px}.tiles,.list,.statusLine{grid-template-columns:1fr}.logo{width:46px;height:46px}.body{padding:10px}}
</style>
</head>
<body>
<div class="app">
<section class="hero"><div class="top"><div class="brand"><div class="logo">⌁</div><div><h1>PhoneSensorLab</h1><p class="sub">Live-Cockpit für alle verfügbaren Android-Sensoren, GPS, Akku, Gerät und Netzwerk.</p></div></div><div class="actions"><button id="pause" class="primary">Pause</button><select id="rate"><option value="normal">Normal</option><option value="slow">Langsam</option><option value="fast">Schnell</option><option value="max">Max</option></select><button id="share">JSON</button><button id="loc">GPS</button></div></div><div class="statusLine"><div class="pulse"><span>Sensoren</span><b id="count">0</b></div><div class="pulse"><span>Update</span><b id="updated">--</b></div><div class="pulse"><span>GPS</span><b id="gpsState">wartet</b></div><div class="pulse"><span>Rate</span><b id="rateLabel">Normal</b></div></div></section>
<section class="grid">
<article class="card wide"><div class="head"><h2>Gerät</h2><span class="pill" id="deviceState">offline</span></div><div class="body"><div class="tiles"><div class="tile" style="--accent:rgba(107,210,255,.2)"><span>Modell</span><b id="model">--</b></div><div class="tile" style="--accent:rgba(167,139,250,.18)"><span>Android</span><b id="android">--</b></div><div class="tile" style="--accent:rgba(112,240,166,.2)"><span>Akku</span><b id="battery">--</b><div class="bars"><div class="bar"><i id="batteryBar"></i></div></div></div><div class="tile" style="--accent:rgba(255,211,110,.18)"><span>Netz</span><b id="network">--</b></div></div></div></article>
<article class="card"><div class="head"><h2>GPS</h2><span class="pill">Standort</span></div><div class="body"><div class="tiles"><div class="tile"><span>Lat</span><b id="lat">--</b></div><div class="tile"><span>Lon</span><b id="lon">--</b></div><div class="tile"><span>Speed</span><b id="speed">--</b></div><div class="tile"><span>Genauigkeit</span><b id="acc">--</b></div></div></div></article>
<article class="card"><div class="head"><h2>Live-Favoriten</h2><span class="pill">aktiv</span></div><div class="body"><div id="topSensors" class="list"></div></div></article>
<article class="card wide"><div class="head"><h2>Alle Sensoren</h2><span class="pill">Rohwerte</span></div><div class="body"><div id="sensors" class="list"></div></div></article>
</section></div>
<script>
let last=null,running=true;const $=id=>document.getElementById(id);function fmt(v,d=2){return v==null?'--':Number(v).toFixed(d)}function vals(a){return !a||!a.length?'--':a.map(x=>Number(x).toFixed(3)).join(' · ')}function groupName(t){const m={1:'Accelerometer',2:'Magnetometer',3:'Orientation',4:'Gyroscope',5:'Light',6:'Pressure',8:'Proximity',9:'Gravity',10:'Linear Accel',11:'Rotation Vector',18:'Step Detector',19:'Step Counter'};return m[t]||('Sensor Typ '+t)}function cls(t){if([1,3,4,9,10,11,18,19].includes(t))return'motion';if([5,6,8,12,13,14].includes(t))return'env';if([2].includes(t))return'pos';return'other'}function bars(a){if(!a||!a.length)return'';return '<div class="bars">'+a.slice(0,3).map(v=>'<div class="bar"><i style="width:'+Math.min(100,Math.abs(v)*10)+'%"></i></div>').join('')+'</div>'}function sensorCard(s){return `<div class="sensor ${cls(s.type)}"><span>${groupName(s.type)}</span><b>${s.name}</b><div class="values">${vals(s.values)}</div>${bars(s.values)}<div class="meta">Range ${fmt(s.range,1)} · Res ${fmt(s.resolution,4)} · ${s.vendor}</div></div>`}window.onNativeSensorUpdate=function(d){last=d;model.textContent=(d.device.manufacturer+' '+d.device.model).trim();android.textContent=d.device.android+' / SDK '+d.device.sdk;battery.textContent=d.device.battery+'%'+(d.device.charging?' ⚡':'');batteryBar.style.width=Math.max(0,Math.min(100,d.device.battery))+'%';network.textContent=d.device.network;deviceState.textContent=d.device.network;deviceState.className='pill ok';count.textContent=d.sensors.length;updated.textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});if(d.location){gpsState.textContent='aktiv';gpsState.className='ok';lat.textContent=fmt(d.location.lat,5);lon.textContent=fmt(d.location.lon,5);speed.textContent=fmt(d.location.speed,1)+' km/h';acc.textContent=fmt(d.location.accuracy,0)+' m'}else{gpsState.textContent='kein Fix';gpsState.className='warn';}let active=d.sensors.filter(s=>s.values&&s.values.length);let priority=[1,4,9,10,11,2,5,6,8,19];active.sort((a,b)=>priority.indexOf(a.type)<0?99:priority.indexOf(a.type)- (priority.indexOf(b.type)<0?99:priority.indexOf(b.type)));topSensors.innerHTML=active.slice(0,6).map(sensorCard).join('')||'<div class="empty">Noch keine Livewerte.</div>';sensors.innerHTML=d.sensors.map(sensorCard).join('')};pause.onclick=()=>{running=!running;pause.textContent=running?'Pause':'Start';AndroidBridge.setRunning(running)};rate.onchange=()=>{AndroidBridge.setRate(rate.value);rateLabel.textContent=rate.options[rate.selectedIndex].text};loc.onclick=()=>AndroidBridge.openLocationSettings();share.onclick=()=>{const txt=AndroidBridge.snapshot();navigator.clipboard&&navigator.clipboard.writeText(txt);alert('JSON in Zwischenablage kopiert, falls vom System erlaubt.');};
</script>
</body></html>
